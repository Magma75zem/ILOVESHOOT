<html lang="en">

    <title>ILOVESHOOT — Audiovisual Production Oslo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    
    <style>
        :root {
            --bg-dark: #F0EAD6;         /* Eggshell */
            --bg-card: #FFFFFF;         /* Blanco puro */
            --text-primary: #1A1A1A;    /* Gris casi negro */
            --text-secondary: #4A4A4A;  /* Gris medio */
            --accent-gold: #FF7F50;     /* Naranja Coral */
            --accent-warm: #E66F45;     /* Naranja más oscuro */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(180deg, #FFFFFF 0%, #FFFFFF 25%, #F0EAD6 65%, #F0EAD6 100%);
            padding: 4rem 2rem;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            min-height: 100vh;
        }

        .main-logo { 
            max-width: 280px; width: 100%; height: auto; 
            margin-bottom: 2rem; 
        }

        .hero-subtitle {
            font-family: 'Crimson Pro', serif; font-size: clamp(1.2rem, 3vw, 1.6rem);
            color: var(--text-secondary); font-style: italic; margin-bottom: 2.5rem;
            max-width: 700px;
        }

        .hero-cta {
            background-color: var(--accent-gold); color: white !important;
            padding: 1rem 2.5rem; text-decoration: none; border-radius: 5px;
            font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem;
            transition: 0.3s; display: inline-block;
        }

        .hero-cta:hover { background-color: var(--accent-warm); transform: scale(1.05); }

        .hero-image-container { margin-top: 4rem; width: 100%; max-width: 900px; }
