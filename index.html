    <style>
        :root {
            --bg-dark: #F0EAD6;
            --bg-white: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #4A4A4A;
            --accent-gold: #FF7F50;
            --accent-warm: #E66F45;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--bg-dark); color: var(--text-primary); line-height: 1.6; }

        /* --- HERO --- */
        .hero {
            background: linear-gradient(180deg, #FFFFFF 0%, #FFFFFF 25%, #F0EAD6 65%, #F0EAD6 100%);
            padding: 4rem 2rem; display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .main-logo { max-width: 260px; width: 100%; height: auto; margin-bottom: 2rem; }
        .hero-subtitle { font-family: 'Crimson Pro', serif; font-size: clamp(1.1rem, 3vw, 1.5rem); font-style: italic; margin-bottom: 2.5rem; max-width: 600px; }
        .hero-cta { background-color: var(--accent-gold); color: white; padding: 1rem 2.5rem; text-decoration: none; border-radius: 5px; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; transition: 0.3s; }
        .hero-cta:hover { background-color: var(--accent-warm); transform: scale(1.05); }

        /* --- SERVICES (TARIFAS) --- */
        .services { padding: 6rem 2rem; background: var(--bg-dark); text-align: center; }
        .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; color: var(--accent-gold); margin-bottom: 3rem; }
        .services-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .service-card { background: var(--bg-white); padding: 3rem 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s; }
        .service-card:hover { transform: translateY(-10px); }
        .service-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; margin-bottom: 1rem; color: var(--text-primary); }
        .price { font-family: 'Crimson Pro', serif; font-style: italic; font-size: 1.4rem; color: var(--accent-gold); display: block; margin-top: 1.5rem; border-top: 1px solid #eee; padding-top: 1rem; }

        /* --- PORTFOLIO --- */
        .portfolio { padding: 6rem 2rem; background: var(--bg-white); text-align: center; }
        .video-container { max-width: 1000px; margin: 0 auto; border: 4px solid var(--accent-gold); border-radius: 8px; overflow: hidden; line-height: 0; }
        .video-container iframe { width: 100%; aspect-ratio: 16 / 9; }
        .portfolio-link { display: inline-block; margin-top: 2rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--accent-gold); text-decoration: none; border-bottom: 2px solid var(--accent-gold); transition: 0.3s; }
        .portfolio-link:hover { color: var(--text-primary); border-color: var(--text-primary); }
