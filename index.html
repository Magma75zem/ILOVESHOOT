<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILOVESHOOT — Audiovisual Production Oslo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    
    <style>
        :root {
            --bg-dark: #F0EAD6;
            --text-primary: #1A1A1A;
            --text-secondary: #4A4A4A;
            --accent-gold: #FF7F50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .hero {
            background: linear-gradient(180deg, #FFFFFF 0%, #FFFFFF 25%, #F0EAD6 65%, #F0EAD6 100%);
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 80vh;
        }

        .main-logo { 
            max-width: 280px; 
            width: 100%; 
            height: auto; 
            margin-bottom: 2rem; 
        }

        .hero-subtitle {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            font-style: italic;
            margin-bottom: 2.5rem;
            max-width: 600px;
        }

        .hero-cta {
            background-color: var(--accent-gold);
            color: white;
            padding: 1rem 2rem;
            text-decoration: none;
            border-radius: 5px;
            font-family: 'Bebas Neue', sans-serif;
            text-transform: uppercase;
        }

        .hero-image-container { 
            margin-top: 4rem; 
            width: 100%; 
            max-width: 800px; 
        }

        .hero-image {
            width: 100%; 
            height: 400px; 
            object-fit: cover;
            border-radius: 10px;
        }

        .contact {
            padding: 5rem 2rem;
            text-align: center;
            background: var(--bg-dark);
        }

        .contact h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            color: var(--accent-gold);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
        }

        .social-links a { color: var(--text-primary); }
    </style>
</head>
<body>

    <section class="hero">
        <img src="images/logo.png" alt="ILOVESHOOT" class="main-logo">
        
        <p class="hero-subtitle">
            Audiovisual Production • 20+ Years Crafting Stories from NYC to Oslo
        </p>
        
        <a href="mailto:marianogarciaphoto@gmail.com" class="hero-cta">LET'S WORK TOGETHER</a>

        <div class="hero-image-container">
            <img src="images/hero.jpg" alt="Work" class="hero-image">
        </div>
    </section>

    <section id="contact" class="contact">
        <h2>LET'S CREATE</h2>
        <p>marianogarciaphoto@gmail.com</p>
        
        <div class="social-links">
            <a href="https://instagram.com/tu_usuario" target="_blank"><i data-feather="instagram"></i></a>
            <a href="https://facebook.com/tu_pagina" target="_blank"><i data-feather="facebook"></i></a>
            <a href="https://linkedin.com/in/tu_perfil" target="_blank"><i data-feather="linkedin"></i></a>
        </div>
    </section>

    <script>
        feather.replace();
    </script>
</body>
</html>
